<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />

  <title>Mars IT — Qo'llanma / Инструкция</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      var(--tg-theme-bg-color,           #17212b);
      --bg2:     var(--tg-theme-secondary-bg-color,  #232e3c);
      --accent:  var(--tg-theme-button-color,        #5288c1);
      --accent2: #3a7cbf;
      --text:    var(--tg-theme-text-color,          #f5f5f5);
      --sub:     var(--tg-theme-hint-color,          #708499);
      --btn-txt: var(--tg-theme-button-text-color,   #ffffff);
      --danger:  #e05c5c;
      --success: #4caf7d;
      --warn:    #f0ad4e;
      --r:       14px;
      --r-sm:    10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    .header {
      background: var(--bg2);
      padding: 12px 16px 10px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .header-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header-title { font-weight: 800; font-size: 16px; }
    .header-sub   { font-size: 11px; color: var(--sub); }

    /* ── Lang switch ── */
    .lang-bar {
      display: flex; gap: 0;
      background: var(--bg2);
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
      padding: 8px 16px;
    }
    .lang-btn {
      flex: 1; padding: 8px;
      background: rgba(255,255,255,.06);
      color: var(--sub);
      border: none; cursor: pointer;
      font-size: 13px; font-weight: 700;
      transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn:first-child { border-radius: 10px 0 0 10px; }
    .lang-btn:last-child  { border-radius: 0 10px 10px 0; }
    .lang-btn.active { background: var(--accent); color: #fff; }

    /* ── Role tabs ── */
    .role-tabs {
      display: flex; gap: 8px;
      padding: 8px 16px;
      background: var(--bg2);
      border-bottom: 1px solid rgba(255,255,255,.05);
      flex-shrink: 0;
    }
    .role-tab {
      flex: 1; padding: 7px;
      border-radius: 20px;
      font-size: 12px; font-weight: 700;
      cursor: pointer; text-align: center;
      background: rgba(255,255,255,.06); color: var(--sub);
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, color .15s;
    }
    .role-tab.active { background: var(--accent); color: #fff; }

    /* ── Content ── */
    .content {
      flex: 1; overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ── Section ── */
    .section {
      margin-bottom: 20px;
    }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: var(--r) var(--r) 0 0;
      padding: 12px 16px;
    }
    .section-icon  { font-size: 22px; }
    .section-title { font-size: 15px; font-weight: 800; color: #fff; }

    .item-list {
      background: var(--bg2);
      border-radius: 0 0 var(--r) var(--r);
      overflow: hidden;
    }
    .item {
      display: flex; gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .item:last-child { border-bottom: none; }
    .item-icon {
      font-size: 20px;
      width: 28px; text-align: center;
      flex-shrink: 0; padding-top: 1px;
    }
    .item-content { flex: 1; }
    .item-btn  {
      font-size: 13px; font-weight: 700;
      color: var(--text); margin-bottom: 2px;
    }
    .item-desc { font-size: 12px; color: var(--sub); line-height: 1.4; }
    .item-desc b { color: var(--text); }

    /* ── Tip card ── */
    .tip-card {
      background: rgba(82,136,193,.12);
      border: 1px solid rgba(82,136,193,.25);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .tip-icon { font-size: 20px; flex-shrink: 0; }
    .tip-text { font-size: 13px; color: var(--text); line-height: 1.5; }

    /* ── Warning card ── */
    .warn-card {
      background: rgba(224,92,92,.1);
      border: 1px solid rgba(224,92,92,.2);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex; gap: 10px;
    }
    .warn-card .tip-text { color: var(--text); }

    .close-btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: var(--btn-txt);
      border: none; border-radius: var(--r);
      font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .close-btn:active { opacity: .85; }

    /* ── Level table ── */
    .level-grid {
      background: var(--bg2);
      border-radius: 0 0 var(--r) var(--r);
      overflow: hidden;
    }
    .level-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .level-row:last-child { border-bottom: none; }
    .level-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
      color: #fff;
    }
    .level-name {
      flex: 1;
      font-size: 13px; font-weight: 700; color: var(--text);
    }
    .level-xp {
      font-size: 12px; font-weight: 600;
      padding: 3px 8px; border-radius: 10px;
      white-space: nowrap;
    }
  </style>
</head>

function renderLevels(lang) {
  return LEVELS.map(lv => {
    const xpLabel = lv.xp === 0
      ? (lang === 'uz' ? 'Boshlang\'ich' : 'Начальный')
      : lv.xp.toLocaleString() + ' XP';
    return `<div class="level-row" style="background:${lv.bg};">
      <div class="level-num" style="background:${lv.color};">${lv.num}</div>
      <div class="level-name">${lv.name}</div>
      <div class="level-xp" style="background:${lv.bg};color:${lv.color};border:1px solid ${lv.color}40;">${xpLabel}</div>
    </div>`;
  }).join('');
}

/* ─────────────────────────────────── RENDER ────────────────────────────────── */

function setLang(l) {
  lang = l;
  document.getElementById('btn-uz').classList.toggle('active', l === 'uz');
  document.getElementById('btn-ru').classList.toggle('active', l === 'ru');
  render();
}

function setRole(r) {
  role = r;
  document.getElementById('rtab-student').classList.toggle('active', r === 'student');
  document.getElementById('rtab-curator').classList.toggle('active', r === 'curator');
  render();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const d = DATA[role]?.[lang];
  if (!d) return;
  const el = document.getElementById('content');

  let html = '';

  // Tip card
  html += `<div class="tip-card"><div class="tip-icon">💡</div><div class="tip-text">${esc(d.tip)}</div></div>`;

  // Sections
  for (const sec of d.sections) {
    html += `
      <div class="section">
        <div class="section-header">
          <div class="section-icon">${sec.icon}</div>
          <div class="section-title">${esc(sec.title)}</div>
        </div>
        <div class="item-list">
          ${sec.items.map(item => `
            <div class="item">
              <div class="item-icon">${item.icon}</div>
              <div class="item-content">
                <div class="item-btn">${esc(item.btn)}</div>
                <div class="item-desc">${esc(item.desc)}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // Warning
  html += `<div class="warn-card"><div class="tip-icon">⚠️</div><div class="tip-text">${esc(d.warn)}</div></div>`;

  // Close button
  html += `<button class="close-btn" onclick="closePage()">✅ ${lang === 'uz' ? 'Tushundim, yopish' : 'Понял, закрыть'}</button>`;

  el.innerHTML = html;
  el.scrollTop = 0;
}

function closePage() {
  tg?.close();
}

/* ── Init ── */
setRole(role);
render();
</script>
