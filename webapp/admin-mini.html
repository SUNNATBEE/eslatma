<title>Admin Mini App</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0f1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
.header { background: #111827; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1e2a3a; }
.header-title { flex: 1; font-size: 17px; font-weight: 700; color: #fff; }
.header-avatar { font-size: 28px; }
.lang-btn { background: #1e2a3a; border: none; color: #aaa; border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
.content { padding: 16px; padding-bottom: 80px; }
/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111827; border-top: 1px solid #1e2a3a; display: flex; z-index: 100; overflow-x: auto; }
.nav-item { flex: 0 0 64px; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 10px; cursor: pointer; border: none; background: none; color: #555; font-size: 9px; gap: 3px; transition: color 0.2s; position: relative; }
.nav-item.active { color: #2196F3; }
.nav-item .icon { font-size: 20px; }
.nav-badge { position: absolute; top: 4px; right: calc(50% - 16px); background: #f44336; color: #fff; border-radius: 10px; font-size: 9px; padding: 1px 5px; font-weight: 700; }
/* Cards */
.card { background: #111827; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #1e2a3a; }
.card-title { font-size: 14px; color: #7eb8f7; font-weight: 600; margin-bottom: 12px; }
/* Stats grid */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: #111827; border-radius: 12px; padding: 14px; border: 1px solid #1e2a3a; text-align: center; }
.stat-num { font-size: 28px; font-weight: 800; color: #fff; }
.stat-label { font-size: 11px; color: #666; margin-top: 2px; }
/* Student list */
.student-card { background: #111827; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid #1e2a3a; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.2s; }
.student-card:hover { border-color: #2196F3; }
.student-avatar { font-size: 28px; width: 44px; height: 44px; background: #1e2a3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.student-info { flex: 1; min-width: 0; }
.student-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.student-group { font-size: 12px; color: #666; }
.att-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.att-yes { background: #1b4f1b; color: #4CAF50; }
.att-no  { background: #4f1b1b; color: #f44336; }
.att-pending { background: #2a2a00; color: #ffd700; }
/* Search */
.search-box { background: #1e2a3a; border: 1px solid #2a3a4a; color: #fff; border-radius: 10px; padding: 10px 14px; width: 100%; font-size: 14px; margin-bottom: 12px; outline: none; }
.search-box::placeholder { color: #555; }
/* Filter chips */
.chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { background: #1e2a3a; border: 1px solid #2a3a4a; color: #aaa; border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.chip.active { background: #2196F3; color: #fff; border-color: #2196F3; }
/* Bottom Sheet */
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: none; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #111827; border-radius: 20px 20px 0 0; padding: 20px 16px 32px; z-index: 501; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; border-top: 1px solid #1e2a3a; }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: #2a3a4a; border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
/* Buttons */
.btn { border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
.btn-primary { background: #2196F3; color: #fff; }
.btn-success { background: #4CAF50; color: #fff; }
.btn-danger  { background: #f44336; color: #fff; }
.btn-ghost   { background: #1e2a3a; color: #aaa; }
.btn-outline { background: transparent; color: #2196F3; border: 1px solid #2196F3; }
/* Action grid */
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.action-btn { background: #1e2a3a; border: 1px solid #2a3a4a; color: #fff; border-radius: 10px; padding: 12px; font-size: 13px; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.action-btn .ab-icon { font-size: 22px; }
/* Attendance tab filter */
.att-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.att-tab { flex: 1; background: #1e2a3a; border: none; color: #666; border-radius: 8px; padding: 8px 4px; font-size: 12px; cursor: pointer; }
.att-tab.active { background: #2196F3; color: #fff; }
/* Progress bar */
.progress-bar { background: #1e2a3a; border-radius: 8px; height: 8px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); border-radius: 8px; transition: width 0.5s ease; }
/* Text input */
.txt-input { background: #1e2a3a; border: 1px solid #2a3a4a; color: #fff; border-radius: 10px; padding: 12px; width: 100%; font-size: 14px; outline: none; resize: vertical; font-family: inherit; }
.txt-input::placeholder { color: #555; }
/* Group card */
.group-card { background: #111827; border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 1px solid #1e2a3a; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.group-icon { font-size: 28px; }
.group-info { flex: 1; }
.group-name { font-weight: 600; font-size: 14px; }
.group-meta { font-size: 12px; color: #666; margin-top: 2px; }
.toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #333; border-radius: 24px; transition: 0.3s; cursor: pointer; }
.toggle-slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
input:checked + .toggle-slider { background: #4CAF50; }
input:checked + .toggle-slider:before { transform: translateX(20px); }
/* Leaderboard */
.lb-podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin: 16px 0; }
.lb-podium-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.lb-rank-badge { font-size: 24px; }
.lb-podium-name { font-size: 11px; color: #aaa; max-width: 70px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-podium-score { font-size: 12px; color: #ffd700; font-weight: 700; }
.lb-podium-bar { width: 60px; border-radius: 6px 6px 0 0; background: linear-gradient(180deg, #2196F3, #1565C0); }
/* Curator card */
.curator-card { background: #111827; border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 1px solid #1e2a3a; }
.curator-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.curator-status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; }
.curator-status.online { background: #1b4f1b; color: #4CAF50; }
.curator-status.offline { background: #2a2a2a; color: #666; }
/* Referral card */
.ref-card { background: #111827; border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 1px solid #1e2a3a; }
.ref-name { font-weight: 600; font-size: 14px; }
.ref-meta { font-size: 12px; color: #666; margin: 4px 0; }
.ref-actions { display: flex; gap: 8px; margin-top: 10px; }
.ref-actions button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
/* Settings */
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #1e2a3a; }
.setting-label { font-size: 14px; color: #ccc; }
.setting-value { color: #666; font-size: 13px; }
/* Loading / empty */
.loading { text-align: center; padding: 40px; color: #555; }
.empty { text-align: center; padding: 32px; color: #555; font-size: 14px; }
/* Toast */
#toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
/* Inline input */
.inline-label { font-size: 12px; color: #7eb8f7; margin-bottom: 6px; }
/* Xabar yuborish */
.msg-input-area { display: flex; gap: 8px; align-items: flex-end; }
.msg-input-area textarea { flex: 1; }
.msg-send-btn { background: #2196F3; color: #fff; border: none; border-radius: 10px; padding: 12px 16px; cursor: pointer; flex-shrink: 0; }
/* Warning card */
.warn-card { background: #111827; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #7a2020; }
.warn-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.warn-title { font-size: 14px; color: #f44336; font-weight: 600; }
.warn-badge { background: #f44336; color: #fff; border-radius: 10px; font-size: 11px; padding: 2px 8px; font-weight: 700; }
.warn-body { margin-top: 12px; display: none; }
.warn-body.open { display: block; }
.warn-item { padding: 8px 0; border-bottom: 1px solid #1e2a3a; font-size: 13px; color: #ccc; }
.warn-item:last-child { border-bottom: none; }
.warn-section-label { font-size: 12px; color: #f44336; font-weight: 600; margin: 10px 0 6px; }
/* Attendance toggle actions */
.att-actions { display: flex; gap: 8px; margin-top: 8px; }
.att-actions button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.att-card-clickable { cursor: pointer; }
.att-card-clickable:active { opacity: 0.8; }
/* SVG Chart card */
.chart-card { background: #111827; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #1e2a3a; }
.chart-title { font-size: 14px; color: #7eb8f7; font-weight: 600; margin-bottom: 14px; }
.chart-wrap { overflow-x: auto; }
.chart-tooltip { position: absolute; background: #222; color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 8px; pointer-events: none; white-space: nowrap; z-index: 999; opacity: 0; transition: opacity 0.2s; }
</style>

// тФАтФА Auth Token (parol login) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
let _sessionToken = localStorage.getItem('miniAdminToken') || '';
let _sessionUser  = localStorage.getItem('miniAdminUser')  || '';

function _authHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (initData)       h['X-Init-Data']    = initData;
  if (_sessionToken)  h['Authorization']  = 'Bearer ' + _sessionToken;
  return h;
}

// тФАтФА API тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
async function api(path, opts = {}) {
  try {
    const res = await fetch(path, {
      ...opts,
      headers: { ..._authHeaders(), ...(opts.headers || {}) },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    let data = {};
    try { data = await res.json(); } catch(e) { data = { error: 'Server xatosi' }; }
    if (res.status === 401) {
      showLoginPage();
      return { ok: false, error: data.error || 'Unauthorized', code: data.code || 'unauthorized' };
    }
    if (!res.ok) {
      return { ok: false, error: data.error || 'Server xatosi', code: data.code || 'http_error', status: res.status };
    }
    return data;
  } catch(e) {
    return { ok: false, error: 'Tarmoq xatosi', code: 'network_error' };
  }
}

// тФАтФА Login / Logout тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function showLoginPage() {
  const p = document.getElementById('loginPage');
  p.style.display = 'flex';
  // Nav va content ni yashiramiz
  document.querySelector('.bottom-nav').style.display = 'none';
  document.querySelector('.header').style.display    = 'none';
}
function hideLoginPage() {
  const p = document.getElementById('loginPage');
  p.style.display = 'none';
  document.querySelector('.bottom-nav').style.display = 'flex';
  document.querySelector('.header').style.display    = 'flex';
}

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errEl    = document.getElementById('loginErr');
  const btn      = document.getElementById('loginBtn');
  if (!username || !password) { errEl.textContent = 'Login va parolni kiriting'; errEl.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'тП│ Tekshirilmoqda...';
  errEl.style.display = 'none';
  try {
    const res = await fetch('/api/mini-admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const d = await res.json();
    if (!res.ok || !d.token) {
      errEl.textContent = d.error || 'Login yoki parol noto\'g\'ri';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Kirish тЖТ';
      return;
    }
    _sessionToken = d.token;
    _sessionUser  = d.username;
    localStorage.setItem('miniAdminToken', _sessionToken);
    localStorage.setItem('miniAdminUser',  _sessionUser);
    hideLoginPage();
    showTab('dashboard', true);
  } catch(e) {
    errEl.textContent = 'Tarmoq xatosi';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Kirish тЖТ';
  }
}

async function doLogout() {
  if (_sessionToken) {
    await fetch('/api/mini-admin/logout', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + _sessionToken }
    }).catch(() => {});
  }
  _sessionToken = ''; _sessionUser = '';
  localStorage.removeItem('miniAdminToken');
  localStorage.removeItem('miniAdminUser');
  showLoginPage();
}

      case 'groups':      await renderGroups(); break;
      case 'attendance':  await renderAttendance(); break;

async function loadWeeklyChart() {
  const data = await api('/api/admin/weekly-stats');
  const days = data.days || [];
  const el = document.getElementById('dashChart');
  if (!el) return;
  if (days.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="chart-card">
      <div class="chart-title">ЁЯУК ${t('weekly_chart')}</div>
      ${renderWeeklySVG(days)}
    </div>
  `;
}

function renderWeeklySVG(days) {
  const W = 280, H = 120, barW = 28, gap = 12;
  const totalW = days.length * (barW + gap) - gap + 20;
  const svgW = Math.max(W, totalW);
  const maxH = 80, labelY = H - 4, barBase = H - 22;

  const defs = `
    <defs>
      <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#42a5f5"/>
        <stop offset="100%" stop-color="#1565C0"/>
      </linearGradient>
    </defs>
  `;

  const bars = days.map((d, i) => {
    const x = 10 + i * (barW + gap);
    const pct = Math.max(0, Math.min(100, d.present_pct || 0));
    const bh = Math.round((pct / 100) * maxH);
    const by = barBase - bh;
    const label = d.label || '';
    const pctLabel = pct + '%';
    return `
      <g class="bar-group" data-pct="${pctLabel}" data-label="${label}">
        <rect x="${x}" y="${by}" width="${barW}" height="${bh}" rx="5" fill="url(#barGrad)" opacity="0.9"/>
        <text x="${x + barW/2}" y="${labelY}" text-anchor="middle" font-size="10" fill="#666">${label}</text>
        <rect x="${x}" y="0" width="${barW}" height="${H}" fill="transparent"
          onmouseover="showChartTip(event,'${pctLabel} тАФ ${label}')"
          onmouseleave="hideChartTip()"
          ontouchstart="showChartTip(event,'${pctLabel} тАФ ${label}')"
          ontouchend="hideChartTip()"
          style="cursor:pointer;"/>
      </g>
    `;
  }).join('');

  return `
    <div class="chart-wrap" style="position:relative;">
      <div class="chart-tooltip" id="chartTip"></div>
      <svg width="100%" viewBox="0 0 ${svgW} ${H}" preserveAspectRatio="xMinYMid meet"
        style="overflow:visible;display:block;">
        ${defs}
        ${bars}
      </svg>
    </div>
  `;
}

function showChartTip(e, text) {
  const tip = document.getElementById('chartTip');
  if (!tip) return;
  tip.textContent = text;
  tip.style.opacity = '1';
  const rect = e.currentTarget.closest('.chart-wrap').getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  tip.style.left = (clientX - rect.left) + 'px';
  tip.style.top = (clientY - rect.top - 32) + 'px';
}
function hideChartTip() {
  const tip = document.getElementById('chartTip');
  if (tip) tip.style.opacity = '0';
}

  const isOpen = actionsEl.style.display === 'flex';

async function updateAttStatus(userId, newStatus, date) {
  // Hide action buttons immediately for feedback
  const actionsEl = document.getElementById('attactions_' + userId);
  if (actionsEl) actionsEl.style.display = 'none';
  const badgeEl = document.getElementById('attbadge_' + userId);
  if (badgeEl) {
    badgeEl.className = 'att-badge ' + (newStatus==='yes'?'att-yes':newStatus==='no'?'att-no':'att-pending');
    badgeEl.textContent = newStatus==='yes'?'тЬЕ':newStatus==='no'?'тЭМ':'тП│';
  }
  const r = await api('/api/admin/attendance-update', {
    method: 'POST',
    body: { user_id: userId, date: date, status: newStatus }
  });
  if (r.ok || r.status === 'ok') {
    showToast('тЬЕ ' + t('status_changed'));
    // Reload attendance data in background to sync counts
    const data = await api('/api/admin/attendance');
    _attData = data;
  } else {
    showToast('тЭМ ' + (r.error || t('error')));
    // Reload to revert optimistic UI
    await renderAttendance();
  }
}

function renderLbPodium(top3) {

  const heights = [60, 80, 50];

  return `
    <div class="lb-podium">
      ${order.map((idx, pos) => top3[idx] ? `
        <div class="lb-podium-item">
          <span style="font-size:20px;">${top3[idx].avatar||'ЁЯСд'}</span>

async function switchLb(type, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  _lbGameType = type;
  if (type === 'xp') {
    const data = await api('/api/student/leaderboard/global');
    _lbData = data.leaders || [];
    renderLbView();
  } else {
    const data = await api('/api/game/leaderboard?type=' + type);
    const leaders = (data.leaders || []).map((l, i) => ({...l, xp: l.score, level: 1}));
    document.getElementById('lbList').innerHTML = leaders.map((s, i) => `
      <div class="student-card" style="cursor:default;">

}

async function confirmApproveRef(id, groupName) {

  closeSheet();
  const r = await api(`/api/admin/referral-students/${id}/approve`, { method: 'POST', body: { group_name: groupName } });

    const marsInfo = r.mars_id ? ` Mars ID: ${r.mars_id}` : '';
    showToast('тЬЕ Tasdiqlandi!' + marsInfo);
    await loadReferrals();

  `, 'тЭМ Rad etish');

async function confirmRejectRef(id) {
  const reason = (document.getElementById('rejectReasonInput')?.value || '').trim();
  if (!reason) { showToast('Sabab yozing'); return; }
  closeSheet();
  const r = await api(`/api/admin/referral-students/${id}/reject`, { method: 'POST', body: { reason } });
  if (r.ok) { showToast('ЁЯФ┤ Rad etildi. Xabar yuborildi.'); await loadReferrals(); }
  else showToast('тЭМ ' + (r.error || t('error')));
}

function renderJobStatus(sys) {
  const jobs = sys?.scheduler?.jobs || {};
  const keys = Object.keys(jobs);
  if (!keys.length) return 'Scheduler job holati topilmadi';
  return keys.map(k => {
    const j = jobs[k] || {};
    const ok = j.ok ? 'тЬЕ' : 'тЪая╕П';
    return `<div style="padding:6px 0;border-bottom:1px solid #1f2937;">
      <b>${ok} ${k}</b><br>
      <span style="color:#6b7280;">${j.updated_at || ''} ${j.details ? 'тАв '+j.details : ''}</span>
    </div>`;
  }).join('');
}
async function saveAdminProfile() {
  const displayName = document.getElementById('displayNameInput')?.value.trim();
  const avatarEmoji = document.getElementById('avatarInput')?.value.trim();
  const r = await api('/api/admin/profile', { method: 'POST', body: { display_name: displayName, avatar_emoji: avatarEmoji } });
  if (r.ok) {
    showToast('тЬЕ ' + t('success'));
    document.getElementById('headerAvatar').textContent = avatarEmoji || 'ЁЯСитАНЁЯТ╝';
    document.getElementById('headerTitle').textContent = displayName || 'Admin';
  } else showToast('тЭМ ' + (r.error || t('error')));
}
async function saveReminderTime() {
  const h = parseInt(document.getElementById('reminderH')?.value || '20');
  const m = parseInt(document.getElementById('reminderM')?.value || '0');
  const r = await api('/api/admin/reminder-time', { method: 'POST', body: { hour: h, minute: m } });
  if (r.ok) showToast(`тЬЕ Eslatma vaqti: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
  else showToast('тЭМ ' + (r.error || t('error')));
}
async function sendBroadcast() {
  const text = document.getElementById('broadcastText')?.value.trim();
  const target = document.getElementById('broadcastTarget')?.value || 'all';
  if (!text) { showToast('тЭМ Xabar bo\'sh'); return; }
  const r = await api('/api/admin/broadcast', { method: 'POST', body: { text, target } });
  if (r.ok) showToast(`тЬЕ Yuborildi: ${r.sent}, Xato: ${r.failed}`);
  else showToast('тЭМ ' + (r.error || t('error')));
}

// тФАтФА Broadcast Sheet тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function showBroadcastSheet() {
  openSheet(`
    <div style="margin-bottom:12px;">
      <div class="inline-label">${t('target')}</div>
      <select class="search-box" id="bcTarget">
        <option value="all">Barcha o'quvchilar</option>
        <option value="parents">Ota-ona guruhlar</option>
        <option value="students_group">O'quvchi guruhlar</option>
      </select>
    </div>
    <div style="margin-bottom:16px;">
      <div class="inline-label">${t('message')}</div>
      <textarea class="txt-input" id="bcText" rows="5" placeholder="${t('message')}..."></textarea>
    </div>
    <button class="btn btn-success" onclick="doQuickBroadcast()">${t('send')}</button>
  `, 'ЁЯУв ' + t('broadcast'));
}
async function doQuickBroadcast() {
  const text = document.getElementById('bcText')?.value.trim();
  const target = document.getElementById('bcTarget')?.value || 'all';
  if (!text) { showToast('тЭМ Xabar bo\'sh'); return; }
  const r = await api('/api/admin/broadcast', { method: 'POST', body: { text, target } });
  if (r.ok) { showToast(`тЬЕ Yuborildi: ${r.sent}`); closeSheet(); }
  else showToast('тЭМ ' + (r.error || t('error')));
}

async function showTemplateSheet() {
  const r = await api('/api/admin/message-templates');
  const list = r.templates || [];
  if (!list.length) { showToast('тЭМ Shablon topilmadi'); return; }
  openSheet(`
    <div style="display:grid;gap:8px;">
      ${list.map(x => `
        <button class="btn btn-outline" onclick="useTemplate('${(x.text||'').replace(/'/g, "\\'")}')">
          ${x.label}
        </button>
      `).join('')}
    </div>
  `, 'ЁЯУЪ Tezkor shablonlar');
}

function useTemplate(text) {
  closeSheet();
  setTimeout(() => {
    showBroadcastSheet();
    setTimeout(() => {
      const el = document.getElementById('bcText');
      if (el) el.value = text || '';
    }, 120);
  }, 160);
}

async function loadAuditLogs() {
  const box = document.getElementById('auditLogsBox');
  if (!box) return;
  const r = await api('/api/admin/audit-logs');
  const logs = (r.logs || []).slice(0, 20);
  if (!logs.length) { box.textContent = 'Loglar yoтАШq'; return; }
  box.innerHTML = logs.map(x => `
    <div style="padding:6px 0;border-bottom:1px solid #1f2937;">
      <b>${x.action}</b> ${x.target ? 'тАФ '+x.target : ''}<br>
      <span style="color:#6b7280;">${x.created_at || ''} ${x.details ? 'тАв '+x.details : ''}</span>
    </div>
  `).join('');
}

// тФАтФА Homework Pipeline тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
async function renderHomework() {
  const [groupsRes, tasksRes, hwScheduleRes] = await Promise.all([
    api('/api/admin/groups').catch(() => ({ groups: [] })),
    api('/api/admin/homework-tasks').catch(() => ({ tasks: [] })),
    api('/api/admin/hw-schedule').catch(() => ({ groups: [] })),
  ]);
  const groups = groupsRes.groups || [];
  _hwTasks = tasksRes.tasks || [];
  _hwTodayGroups = (hwScheduleRes.groups || []).map(x => x.group_name || x.name).filter(Boolean);
  const uniqueGroups = ['all', ...new Set(_hwTasks.map(x => x.group_name))];
  const statuses = ['all', 'draft', 'assigned', 'reviewed', 'rework', 'done'];
  const filtered = _hwTasks.filter(x =>
    (_hwFilterGroup === 'all' || x.group_name === _hwFilterGroup) &&
    (_hwFilterStatus === 'all' || x.status === _hwFilterStatus) &&
    (!_hwOnlyToday || _hwTodayGroups.includes(x.group_name))
  );
  _hwSelectedIds = _hwSelectedIds.filter(id => filtered.some(x => x.id === id));

  document.getElementById('mainContent').innerHTML = `
    <div class="card">
      <div class="card-title">ЁЯУЭ Homework Pipeline</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <select class="search-box" id="hwGroupFilter" onchange="_hwFilterGroup=this.value;renderHomework()" style="margin-bottom:0;">
          ${uniqueGroups.map(g => `<option value="${g}" ${_hwFilterGroup===g?'selected':''}>${g==='all'?'Barcha guruhlar':g}</option>`).join('')}
        </select>
        <select class="search-box" id="hwStatusFilter" onchange="_hwFilterStatus=this.value;renderHomework()" style="margin-bottom:0;">
          ${statuses.map(s => `<option value="${s}" ${_hwFilterStatus===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="action-grid" style="margin-top:12px;">
        <button class="action-btn" onclick="showHomeworkCreateSheet()"><span class="ab-icon">тЮХ</span><span>Yangi vazifa</span></button>
        <button class="action-btn" onclick="showHomeworkRestoreSheet()"><span class="ab-icon">тЩ╗я╕П</span><span>Qaytarish</span></button>
        <button class="action-btn" onclick="toggleTodayHomeworkFilter()"><span class="ab-icon">ЁЯУЕ</span><span>${_hwOnlyToday ? 'Bugungi: ON' : 'Bugungi guruhlar'}</span></button>
        <button class="action-btn" onclick="showHomeworkBulkStatusSheet()"><span class="ab-icon">ЁЯзй</span><span>Bulk status</span></button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Jami: ${filtered.length}</div>
      ${filtered.length ? filtered.map(x => `
        <div class="student-card" style="display:block;cursor:default;">
          <div style="display:flex;justify-content:space-between;gap:8px;">
            <div>
              <input type="checkbox" ${_hwSelectedIds.includes(x.id) ? 'checked' : ''} onchange="toggleHomeworkSelection(${x.id}, this.checked)">
              <b>${x.group_name}</b> тАв #${x.id}
            </div>
            <span class="att-badge">${x.status}</span>
          </div>
          <div style="font-size:12px;color:#bbb;margin-top:6px;">${(x.text||'').slice(0,220)}</div>
          <div style="font-size:11px;color:#666;margin-top:6px;">
            ${x.updated_at || ''}${x.due_at ? ' тАв deadline: '+x.due_at : ''}
          </div>
          <div class="chips" style="margin-top:8px;margin-bottom:0;">
            ${['draft','assigned','reviewed','rework','done'].map(s => `<div class="chip ${x.status===s?'active':''}" onclick="setHomeworkStatus(${x.id},'${s}')">${s}</div>`).join('')}
          </div>
        </div>
      `).join('') : `<div class="empty">Vazifalar yo'q</div>`}
    </div>
    <div class="card">
      <div class="card-title">Faol guruhlar</div>
      <div style="font-size:12px;color:#aaa;">${(groups || []).map(g => g.name).join(', ')}</div>
    </div>
  `;
}

async function setHomeworkStatus(taskId, status) {
  const r = await api('/api/admin/homework-task-update', { method: 'POST', body: { task_id: taskId, status } });
  if (r.ok) { showToast('тЬЕ Status yangilandi'); await renderHomework(); }
  else showToast('тЭМ ' + (r.error || t('error')));
}

function showHomeworkCreateSheet(prefillGroup = '') {
  const safeGroup = (prefillGroup || '').replace(/"/g, '&quot;');
  const isLocked = !!prefillGroup;
  openSheet(`
    <div class="inline-label">Guruh nomi</div>
    <input class="search-box" id="hwCreateGroup" placeholder="nF-2803" value="${safeGroup}" ${isLocked ? 'readonly' : ''}>
    ${isLocked ? `<div style="color:#6b7280;font-size:12px;margin-bottom:8px;">Guruh eslatmadan avtomatik tanlandi.</div>` : ''}
    <div class="inline-label">Deadline (ixtiyoriy)</div>
    <input type="datetime-local" class="search-box" id="hwCreateDueAt">
    <div class="inline-label">Vazifa matni</div>
    <textarea class="txt-input" id="hwCreateText" rows="6" placeholder="Uy vazifa..."></textarea>
    <button class="btn btn-primary" onclick="createHomeworkFromSheet()">Yuborish</button>
  `, 'тЮХ Yangi uy vazifa');
}

async function createHomeworkFromSheet() {
  const group_name = (document.getElementById('hwCreateGroup')?.value || '').trim();
  const text = (document.getElementById('hwCreateText')?.value || '').trim();
  const due_at = (document.getElementById('hwCreateDueAt')?.value || '').trim();
  if (!group_name || !text) { showToast('тЭМ group_name va text kerak'); return; }
  const r = await api('/api/admin/send-homework', { method: 'POST', body: { group_name, text, due_at } });
  if (r.ok) {
    showToast('тЬЕ Uy vazifa yuborildi');
    closeSheet();
    await renderHomework();
  } else showToast('тЭМ ' + (r.error || t('error')));
}

function showHomeworkRestoreSheet() {
  openSheet(`
    <div class="inline-label">Guruh nomi</div>
    <input class="search-box" id="hwRestoreGroup" placeholder="nF-2803">
    <div class="action-grid">
      <button class="btn btn-danger" onclick="deleteHomeworkByGroup()">ЁЯЧС O'chirish (soft)</button>
      <button class="btn btn-success" onclick="restoreHomeworkByGroup()">тЩ╗я╕П Restore</button>
    </div>
  `, 'тЩ╗я╕П Soft delete / restore');
}

async function deleteHomeworkByGroup() {
  const group_name = (document.getElementById('hwRestoreGroup')?.value || '').trim();
  if (!group_name) { showToast('тЭМ group_name kerak'); return; }
  const r = await api('/api/admin/delete-homework', { method: 'POST', body: { group_name } });
  if (r.ok) { showToast('тЬЕ Soft delete qilindi'); await renderHomework(); }
  else showToast('тЭМ ' + (r.error || t('error')));
}

async function restoreHomeworkByGroup() {
  const group_name = (document.getElementById('hwRestoreGroup')?.value || '').trim();
  if (!group_name) { showToast('тЭМ group_name kerak'); return; }
  const r = await api('/api/admin/restore-homework', { method: 'POST', body: { group_name } });
  if (r.ok) { showToast('тЬЕ Restore qilindi'); await renderHomework(); }
  else showToast('тЭМ ' + (r.error || t('error')));
}

function toggleHomeworkSelection(taskId, checked) {
  if (checked && !_hwSelectedIds.includes(taskId)) _hwSelectedIds.push(taskId);
  if (!checked) _hwSelectedIds = _hwSelectedIds.filter(x => x !== taskId);
}

function toggleTodayHomeworkFilter() {
  if (!_hwTodayGroups.length) {
    showToast('тЪая╕П Bugungi guruhlar topilmadi');
    return;
  }
  _hwOnlyToday = !_hwOnlyToday;
  _hwSelectedIds = [];
  showToast(_hwOnlyToday ? 'ЁЯУЕ Bugungi guruhlar filtri yoqildi' : 'ЁЯУЕ Bugungi guruhlar filtri o\'chirildi');
  renderHomework();
}

function showHomeworkBulkStatusSheet() {
  if (!_hwSelectedIds.length) {
    showToast('тЪая╕П Avval tasklarni belgilang');
    return;
  }
  const statuses = ['draft','assigned','reviewed','rework','done'];
  openSheet(`
    <div style="color:#aaa;font-size:12px;margin-bottom:12px;">Tanlangan tasklar: ${_hwSelectedIds.length}</div>
    <div class="chips">
      ${statuses.map(s => `<div class="chip" onclick="bulkUpdateHomeworkStatus('${s}')">${s}</div>`).join('')}
    </div>
  `, 'ЁЯзй Bulk status update');
}

async function bulkUpdateHomeworkStatus(status) {
  const r = await api('/api/admin/homework-task-bulk-update', {
    method: 'POST',
    body: { task_ids: _hwSelectedIds, status }
  });
  if (r.ok) {
    showToast(`тЬЕ Yangilandi: ${r.updated}/${r.requested}`);
    _hwSelectedIds = [];
    closeSheet();
    await renderHomework();
  } else showToast('тЭМ ' + (r.error || t('error')));
}

// тФАтФА Auth check & Init тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
async function init() {
  // 1. Avval mavjud token yoki initData ni tekshiramiz
  const r = await fetch('/api/admin/me', { headers: _authHeaders() });
  if (r.status === 401) {
    // Token va initData ham ishlamadi тЖТ login sahifasi
    showLoginPage();
    return;
  }
  const data = await r.json();
  if (data.error) {
    showLoginPage();
    return;
  }
  hideLoginPage();
  updateNavLabels();
  if (_prefillHwGroup) {
    showTab('homework', true);
    setTimeout(() => showHomeworkCreateSheet(_prefillHwGroup), 220);
    return;
  }
  showTab('dashboard', true);
}

init();
</script>
